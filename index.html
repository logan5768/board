<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Идейная доска</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --note-bg: #fffef7;
    --note-border: #2a2a2a;
    --note-shadow: 0 2px 8px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
    --accent: #2563eb;
    --arrow: #374151;
    --arrow-hover: #2563eb;
    --chat-width: 340px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #111;
    overflow: hidden;
    user-select: none;
  }

  #board {
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 1px 1px, #e5e7eb 1px, transparent 0) 0 0 / 24px 24px,
      #ffffff;
    background-attachment: local;
    cursor: crosshair;
    overflow: hidden;
    touch-action: none;
  }
  /* Все карточки живут внутри #world, который масштабируется через transform.
     SVG-стрелки и подписи остаются в координатах окна — анкеры берутся из BCR. */
  #world {
    position: absolute;
    left: 0; top: 0;
    width: 0; height: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* SVG layer for arrows — sits between board bg and notes */
  #wires {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  #wires .wire { pointer-events: none; }
  #wires .wire.hover { stroke: #ef4444; }
  #wires .wire.selected { stroke: var(--arrow-hover); }
  /* Невидимая широкая дорожка поверх линии — большой хитбокс для клика/ПКМ */
  #wires .wire-hit { pointer-events: stroke; cursor: pointer; fill: none; }
  #wires .ghost { pointer-events: none; stroke-dasharray: 6 5; opacity: .8; }

  /* Floating label over wire */
  .wire-label {
    position: absolute;
    transform: translate(-50%, -50%);
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 13px;
    line-height: 1.4;
    color: #111;
    box-shadow: 0 2px 6px rgba(0,0,0,.08);
    max-width: 260px;
    min-width: 14px;
    min-height: 20px;
    z-index: 50;
    cursor: text;
    outline: none;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    text-align: center;
  }
  .wire-label:empty::before {
    content: "+";
    color: #9ca3af;
  }
  .wire-label.placeholder-hidden:empty::before { content: ""; }
  .wire-label:hover { border-color: var(--accent); }
  .wire-label:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }

  /* selection rectangle being drawn */
  #selection {
    position: absolute;
    border: 1.5px dashed var(--accent);
    background: rgba(37, 99, 235, .06);
    pointer-events: none;
    display: none;
  }

  .note {
    position: absolute;
    min-width: 80px;
    min-height: 48px;
    background: var(--note-bg);
    border: 1.5px solid var(--note-border);
    border-radius: 10px;
    box-shadow: var(--note-shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: box-shadow .15s ease;
    z-index: 10;
  }
  .note:hover { box-shadow: 0 4px 14px rgba(0,0,0,.12), 0 12px 32px rgba(0,0,0,.08); }
  .note.focused {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, .15), var(--note-shadow);
  }
  .note.link-target {
    border-color: #10b981 !important;
    box-shadow: 0 0 0 3px rgba(16,185,129,.25), var(--note-shadow);
  }

  .note .bar {
    height: 32px;
    flex: 0 0 32px;
    background: linear-gradient(180deg, #f3f4f6, #e5e7eb);
    border-bottom: 1px solid #d1d5db;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 6px;
    user-select: none;
    gap: 6px;
  }
  .note .title {
    /* Узкий хитбокс: занимает только своё содержимое, оставляя бар свободным для drag */
    flex: 0 1 auto;
    min-width: 70px;
    max-width: 50%;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.2;
    color: #1f2937;
    padding: 2px 6px;
    border-radius: 4px;
    outline: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: text;
    user-select: text;
  }
  .note .title:hover { background: rgba(255,255,255,.6); }
  .note .title:focus {
    background: #fff;
    box-shadow: 0 0 0 1.5px var(--accent);
    text-overflow: clip;
  }
  .note .title:empty::before {
    content: "Подпись";
    color: #9ca3af;
    font-weight: 500;
  }
  .note .title:focus:empty::before { content: ""; }
  .note.titling .title:empty::before {
    content: "✦ придумываю заголовок…";
    color: #f97316;
    font-weight: 500;
  }
  .note .bar:active { cursor: grabbing; }
  .note .dots { display: flex; gap: 4px; }
  .note .dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #cbd5e1;
  }
  .note .bar-right { display: flex; align-items: center; gap: 4px; }
  .note .link {
    width: 26px; height: 26px;
    display: grid; place-items: center;
    border-radius: 5px;
    cursor: crosshair;
    color: #374151;
    background: #fff;
    border: 1px solid #9ca3af;
    font-size: 16px;
    line-height: 1;
    user-select: none;
  }
  .note .link:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .note .del {
    font-size: 20px;
    line-height: 1;
    width: 26px; height: 26px;
    display: grid; place-items: center;
    border-radius: 5px;
    cursor: pointer;
    color: #6b7280;
  }
  .note .del:hover { background: #fecaca; color: #991b1b; }

  /* Контейнер вкладок и сами панели */
  .note .panes { flex: 1; display: flex; min-height: 0; }
  .note .pane {
    flex: 1;
    padding: 10px 12px;
    outline: none;
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    overflow-y: auto;
    user-select: text;
    cursor: text;
    color: #111;
  }
  .note .pane[hidden] { display: none; }
  .note .pane.idea:empty::before {
    content: "Запишите идею…";
    color: #9ca3af; pointer-events: none;
  }
  /* Режим схемы: компактное превью — всегда вписано, клик открывает просмотрщик */
  .note .pane.algorithm {
    cursor: zoom-in;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: 6px;
  }
  .note .pane.algorithm svg { display: block; transform-origin: center center; }
  /* Бейдж «развернуть» в углу превью */
  .note .pane.algorithm .expand-badge {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px;
    display: grid; place-items: center;
    background: rgba(255,255,255,.9);
    border: 1px solid #d1d5db;
    border-radius: 6px;
    color: #374151;
    pointer-events: none;
  }
  .note .pane.algorithm .expand-badge svg { width: 13px; height: 13px; }
  /* Если схема не влезла даже на минимальном читаемом масштабе — намёк снизу */
  .note .pane.algorithm.cropped::after {
    content: "целиком — разверните";
    position: absolute; left: 0; right: 0; bottom: 0;
    text-align: center;
    font-size: 11px;
    color: #6b7280;
    background: linear-gradient(to top, var(--note-bg), transparent);
    padding: 10px 0 3px;
    pointer-events: none;
  }
  .note .pane.algorithm.diagram-error {
    font-family: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
    color: #b91c1b;
    white-space: pre-wrap;
    cursor: default;
    align-items: flex-start; justify-content: flex-start;
  }
  .note .pane.algorithm:empty {
    cursor: default;
  }
  /* Нижняя полоска: одна кнопка «текст ⇄ схема» + кнопки режима схемы */
  .note .tabs {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    background: #f9fafb;
    border-top: 1px solid #e5e7eb;
    border-bottom-left-radius: 9px;
    border-bottom-right-radius: 9px;
    user-select: none;
  }
  .note .seg-btn {
    border: 1px solid #d1d5db; background: #fff; color: #374151;
    font-size: 11px; line-height: 1;
    padding: 5px 11px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
  }
  .note .seg-btn:hover { background: #f3f4f6; }
  .note .seg-btn[disabled] { cursor: progress; }
  .note .seg-btn svg { width: 13px; height: 13px; display: block; }
  /* На тексте показываем иконку «в схему», на схеме — «в текст» */
  .note .seg-btn .ic-text { display: none; }
  .note .seg-btn.on-diagram .ic-diagram { display: none; }
  .note .seg-btn.on-diagram .ic-text { display: block; }
  .note .seg-btn .spinner {
    display: none;
    width: 11px; height: 11px;
    border: 2px solid #d1d5db;
    border-top-color: #6b7280;
    border-radius: 50%;
    animation: aiboard-spin .8s linear infinite;
  }
  .note .seg-btn.loading .lbl,
  .note .seg-btn.loading svg { display: none; }
  .note .seg-btn.loading .spinner { display: inline-block; }
  .note .tabs-gap { flex: 1; }
  .note .icon-btn {
    width: 24px; height: 22px;
    display: grid; place-items: center;
    border: 1px solid #d1d5db;
    background: #fff;
    color: #374151;
    border-radius: 6px;
    cursor: pointer;
    padding: 0;
  }
  .note .icon-btn:hover { background: #f3f4f6; }
  .note .icon-btn[hidden] { display: none; }
  .note .icon-btn svg { width: 13px; height: 13px; display: block; }
  @keyframes aiboard-spin { to { transform: rotate(360deg); } }

  /* resize handles — широкая невидимая область, удобно хватать */
  .handle { position: absolute; background: transparent; z-index: 5; }
  .handle.e  { right: -8px;  top: 8px; bottom: 8px; width: 16px; cursor: ew-resize; }
  .handle.w  { left:  -8px;  top: 8px; bottom: 8px; width: 16px; cursor: ew-resize; }
  .handle.n  { top:   -8px;  left: 8px; right: 8px; height: 16px; cursor: ns-resize; }
  .handle.s  { bottom: -8px; left: 8px; right: 8px; height: 16px; cursor: ns-resize; }
  .handle.ne { top: -10px;    right: -10px; width: 20px; height: 20px; cursor: nesw-resize; }
  .handle.nw { top: -10px;    left:  -10px; width: 20px; height: 20px; cursor: nwse-resize; }
  .handle.se { bottom: -10px; right: -10px; width: 20px; height: 20px; cursor: nwse-resize; }
  .handle.sw { bottom: -10px; left:  -10px; width: 20px; height: 20px; cursor: nesw-resize; }
  /* Карточке выключаем overflow, чтобы хэндлы выступали наружу.
     Скругление переносим на bar (верх) и text (низ). */
  .note { overflow: visible; }
  .note .bar  { border-top-left-radius: 9px; border-top-right-radius: 9px; }
  /* Нижние скругления теперь живут на .tabs (см. выше). */

  /* toolbar */
  #toolbar {
    position: fixed;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0,0,0,.08);
    padding: 6px 10px;
    display: flex; align-items: center; gap: 6px;
    font-size: 13px;
    z-index: 1000;
  }
  #toolbar .hint { color: #6b7280; padding: 0 8px; }
  #toolbar button {
    border: 0; background: #f3f4f6;
    padding: 6px 12px; border-radius: 999px;
    cursor: pointer; font-size: 13px;
  }
  #toolbar button:hover { background: #e5e7eb; }
  #toolbar button svg { width: 16px; height: 16px; display: block; }
  /* Лампочка: в светлой теме «горит» (залита тёплым), в тёмной — погашена */
  #theme-bulb { fill: #fbbf24; }
  html.dark #theme-bulb { fill: none; }

  /* text-formatting popover */
  #fmt {
    position: fixed;
    display: none;
    background: #111827;
    color: #fff;
    border-radius: 8px;
    padding: 4px;
    gap: 2px;
    z-index: 2000;
    box-shadow: 0 6px 20px rgba(0,0,0,.25);
  }
  #fmt.show { display: flex; }
  #fmt button {
    background: transparent; color: #fff; border: 0;
    width: 28px; height: 28px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
  }
  #fmt button:hover { background: rgba(255,255,255,.15); }
  #fmt .sep { width: 1px; background: rgba(255,255,255,.2); margin: 4px 2px; }

  /* Баннер авторизации в чате */
  #chat-auth-banner {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: #fffbeb;
    border-bottom: 1px solid #fde68a;
    font-size: 12.5px;
    color: #92400e;
  }
  #chat-auth-banner[hidden] { display: none; }
  #chat-auth-text { flex: 1; }
  #chat-auth-login {
    padding: 4px 12px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 12.5px;
    cursor: pointer;
    white-space: nowrap;
  }
  #chat-auth-login:hover { background: #1d4ed8; }
  #chat-auth-login:disabled { opacity: .6; cursor: progress; }

  /* ===== Chat Panel ===== */
  #chat-panel {
    position: fixed;
    top: 0; right: 0;
    width: 320px;
    height: 100%;
    background: #ffffff;
    border-left: 1px solid #e5e7eb;
    box-shadow: -4px 0 24px rgba(0,0,0,.08);
    display: flex;
    flex-direction: column;
    z-index: 900;
    transform: translateX(100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  #chat-panel.open { transform: translateX(0); }
  /* Стрелки крепятся ко всей панели чата. Подсветка контекста/цели — на ней же. */
  #chat-panel.has-context { border-left-color: #10b981; }
  #chat-panel.link-target-panel {
    border-left-color: #059669;
    box-shadow: -4px 0 24px rgba(0,0,0,.08), inset 4px 0 0 #10b981;
  }
  #chat-header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 12px 10px 20px;
    border-bottom: 1px solid #e5e7eb;
    font-size: 13px;
    font-weight: 600;
    color: #111;
  }
  #chat-header .chat-title { flex: 1; }
  #chat-model {
    font-size: 11px;
    font-weight: 400;
    padding: 2px 4px;
    border: 1px solid #e5e7eb;
    border-radius: 5px;
    background: #fff;
    color: #374151;
    cursor: pointer;
    outline: none;
    flex-shrink: 0;
  }
  #chat-context-count {
    font-size: 11px;
    font-weight: 400;
    color: #6b7280;
    background: #f3f4f6;
    padding: 2px 7px;
    border-radius: 999px;
    white-space: nowrap;
  }
  #chat-context-count.active { background: #d1fae5; color: #065f46; }
  #btn-clear-chat {
    padding: 3px 8px;
    font-size: 12px;
    border: 1px solid #e5e7eb;
    border-radius: 5px;
    background: #fff;
    cursor: pointer;
    color: #6b7280;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #btn-clear-chat:hover { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chat-msg {
    max-width: 92%;
    padding: 8px 11px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
    user-select: text;
  }
  .chat-msg.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 3px; }
  .chat-msg.assistant { align-self: flex-start; background: #f3f4f6; color: #111; border-bottom-left-radius: 3px; }
  .chat-msg.error { align-self: flex-start; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; border-radius: 8px; }
  .chat-msg.thinking { align-self: flex-start; color: #9ca3af; font-style: italic; font-size: 12px; background: none; padding: 2px 0; }
  #chat-input-area {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 12px;
    border-top: 1px solid #e5e7eb;
    background: #f9fafb;
  }
  #chat-input {
    width: 100%;
    min-height: 60px;
    max-height: 140px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    line-height: 1.4;
    resize: none;
    outline: none;
    overflow-y: auto;
    background: #fff;
    user-select: text;
    color: #111;
  }
  #chat-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
  #btn-send-chat {
    align-self: flex-end;
    width: 38px; height: 38px;
    padding: 0;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    display: grid;
    place-items: center;
  }
  #btn-send-chat .send-icon { display: block; }
  #btn-send-chat.loading .send-icon { display: none; }
  #btn-send-chat:hover { background: #1d4ed8; }
  #btn-send-chat:disabled { opacity: .55; cursor: not-allowed; }
  .btn-spinner {
    display: none;
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: aiboard-spin .8s linear infinite;
  }
  #btn-send-chat.loading .btn-spinner { display: inline-block; }
  #toggleChat {
    border: 1px solid #e5e7eb;
    background: #f9fafb;
  }
  #toggleChat.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .note.in-context {
    border-color: #10b981 !important;
    box-shadow: 0 0 0 3px rgba(16,185,129,.45), var(--note-shadow) !important;
  }
  /* Подтверждение карточки от Claude: затенённая доска, сама карточка
     быстро «выплывает», под ней — Создать / Отмена. */
  #confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(17,24,39,.45);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 3500;
  }
  #confirm-overlay.show { display: flex; }
  #confirm-card {
    width: min(380px, 92vw);
    display: flex;
    flex-direction: column;
    background: var(--note-bg);
    border: 1px solid var(--note-border);
    border-radius: 14px;
    box-shadow: 0 16px 48px rgba(0,0,0,.35);
    overflow: hidden;
  }
  /* Вход — только анимация появления; состояние покоя всегда базовое
     (полный размер), без fill-режима — карточка не залипает уменьшенной. */
  #confirm-overlay.show #confirm-card,
  #confirm-overlay.show #confirm-actions {
    animation: confirm-pop .18s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes confirm-pop {
    from { transform: scale(.85) translateY(10px); opacity: 0; }
  }
  /* Минималистичная шапка: только заголовок, без декора-«кружочков» */
  #confirm-card .bar {
    padding: 18px 22px 0;
  }
  #confirm-card .dots { display: none; }
  #confirm-card .title {
    font-size: 17px; font-weight: 600; color: #1f2937;
    line-height: 1.3;
    white-space: normal;
    word-wrap: break-word;
  }
  #confirm-body {
    padding: 12px 22px 22px;
    font-size: 15px;
    line-height: 1.6;
    color: #374151;
    min-height: 340px;
    max-height: 70vh;
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    user-select: text;
  }
  #confirm-actions { display: flex; gap: 10px; }
  #confirm-actions button {
    padding: 8px 20px;
    border-radius: 999px;
    border: 1px solid #d1d5db;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
  }
  #confirm-actions button:hover { background: #f3f4f6; }
  #confirm-actions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  #confirm-actions button.primary:hover { background: #1d4ed8; }
