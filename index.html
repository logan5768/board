<script>
(() => {
  const board = document.getElementById('board');
  const world = document.getElementById('world');
  const selectionEl = document.getElementById('selection');
  const fmt = document.getElementById('fmt');
  const wires = document.getElementById('wires');
  const SVG_NS = 'http://www.w3.org/2000/svg';

  // Chat panel
  const CHAT_PANEL_ID    = 'CHAT_PANEL';
  const CHAT_STORAGE_KEY = 'aiboard.chat.v1';
  const chatPanel        = document.getElementById('chat-panel');
  const chatMessagesEl   = document.getElementById('chat-messages');
  const chatInput        = document.getElementById('chat-input');
  const btnSendChat      = document.getElementById('btn-send-chat');
  const btnClearChat     = document.getElementById('btn-clear-chat');
  const chatContextCount = document.getElementById('chat-context-count');
  const toggleChatBtn    = document.getElementById('toggleChat');
  const confirmOverlay   = document.getElementById('confirm-overlay');
  const confirmTitle     = document.getElementById('confirm-title');
  const confirmBody      = document.getElementById('confirm-body');
  let chatMessages  = [];
  let chatPanelOpen = false;
  let chatSending   = false;
  let hoveredNote   = null;   // id карточки под курсором — для удаления по Delete

  // ---------- zoom / pan ----------
  let zoom = 1, tx = 0, ty = 0;
  const ZOOM_MIN = 0.15, ZOOM_MAX = 4;
  function applyTransform() {
    world.style.transform = `translate(${tx}px, ${ty}px) scale(${zoom})`;
    updateAllWires();
  }
  function screenToWorld(sx, sy) {
    return { x: (sx - tx) / zoom, y: (sy - ty) / zoom };
  }
  function setZoomAt(newZoom, ax, ay) {
    newZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newZoom));
    if (newZoom === zoom) return;
    const wp = screenToWorld(ax, ay);
    zoom = newZoom;
    tx = ax - wp.x * zoom;
    ty = ay - wp.y * zoom;
    applyTransform();
  }
  function resetZoom() {
    zoom = 1; tx = 0; ty = 0; applyTransform();
  }

  const STORAGE_KEY = 'aiboard.notes.v2';
  const MIN_W = 80, MIN_H = 48;

  // data
  const notes = new Map();        // id -> { el }
  const connections = new Map();  // id -> { from, to, label, pathEl, labelEl }
  let zTop = 10;
  let connSeq = 0, noteSeq = 0;

  function uid(prefix) {
    return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
  }

  // ---------- persistence ----------
  function saveAll() {
    const out = {
      notes: [...notes.entries()].map(([id, n]) => ({
        id,
        x: parseFloat(n.el.style.left),
        y: parseFloat(n.el.style.top),
        w: parseFloat(n.el.style.width),
        h: parseFloat(n.el.style.height),
        z: parseFloat(n.el.style.zIndex || 10),
        html: n.el.querySelector('.pane.idea').innerHTML,
        title: n.el.querySelector('.title').textContent || '',
        algorithm: n.el.dataset.mermaidSrc || '',  // mermaid-источник диаграммы
        view: n.el.dataset.view || 'idea',
      })),
      connections: [...connections.entries()].map(([id, c]) => ({
        id, from: c.from, to: c.to, label: c.label || '',
      })),
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(out)); } catch (_) {}
  }
  function loadAll() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      (data.notes || []).forEach(d => createNote(
        d.x, d.y, d.w, d.h, d.html, d.id, d.z,
        d.title || '', d.algorithm || '', d.view || 'idea'
      ));
      (data.connections || []).forEach(c => {
        if (notes.has(c.from) && (notes.has(c.to) || c.to === CHAT_PANEL_ID)) {
          createConnection(c.from, c.to, c.label, c.id);
        }
      });
      updateAllWires();
      updateContextGlows();
    } catch (_) {}
  }

  // ---------- creation by drag (LMB) ----------
  let dragStart = null;
  board.addEventListener('mousedown', (e) => {
    if (e.target !== board && e.target !== world && e.target.tagName !== 'svg' && e.target !== selectionEl) return;
    if (e.button !== 0) return;
    dragStart = { x: e.clientX, y: e.clientY };
    selectionEl.style.display = 'block';
    Object.assign(selectionEl.style, {
      left: e.clientX + 'px', top: e.clientY + 'px',
      width: '0px', height: '0px',
    });
    clearWireSelection();
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragStart) return;
    const x = Math.min(dragStart.x, e.clientX);
    const y = Math.min(dragStart.y, e.clientY);
    const w = Math.abs(e.clientX - dragStart.x);
    const h = Math.abs(e.clientY - dragStart.y);
    Object.assign(selectionEl.style, {
      left: x + 'px', top: y + 'px',
      width: w + 'px', height: h + 'px',
    });
  });
  window.addEventListener('mouseup', (e) => {
    if (!dragStart) return;
    const sx = Math.min(dragStart.x, e.clientX);
    const sy = Math.min(dragStart.y, e.clientY);
    const sw = Math.abs(e.clientX - dragStart.x);
    const sh = Math.abs(e.clientY - dragStart.y);
    selectionEl.style.display = 'none';
    dragStart = null;
    if (sw < 20 || sh < 20) return;
    // Конвертируем экранные координаты в координаты world
    const a = screenToWorld(sx, sy);
    const b = screenToWorld(sx + sw, sy + sh);
    const wW = b.x - a.x, wH = b.y - a.y;
    const note = createNote(a.x, a.y, Math.max(wW, MIN_W), Math.max(wH, MIN_H));
    note.querySelector('.pane.idea').focus();
  });

  // ---------- RMB drag: зум (вниз — отдаляет, вверх — приближает) ----------
  let rmbState = null;
  let lastRmbClickT = 0;
  board.addEventListener('contextmenu', (e) => e.preventDefault());
  board.addEventListener('mousedown', (e) => {
    if (e.button !== 2) return;
    e.preventDefault();
    rmbState = {
      anchorX: e.clientX, anchorY: e.clientY,
      lastX: e.clientX, lastY: e.clientY,
      moved: false, target: e.target,
    };
  });
  window.addEventListener('mousemove', (e) => {
    if (!rmbState) return;
    const dx = e.clientX - rmbState.lastX;
    const dy = e.clientY - rmbState.lastY;
    if (dx === 0 && dy === 0) return;
    rmbState.lastX = e.clientX;
    rmbState.lastY = e.clientY;
    rmbState.moved = true;
    if (e.ctrlKey || e.metaKey) {
      // Ctrl + ПКМ — зум: вверх приближает, вниз отдаляет (вокруг точки клика)
      if (dy !== 0) {
        const factor = Math.exp(-dy * 0.006);
        setZoomAt(zoom * factor, rmbState.anchorX, rmbState.anchorY);
      }
    } else {
      // ПКМ без Ctrl — обычное панорамирование во все стороны
      tx += dx;
      ty += dy;
      applyTransform();
    }
  });
  window.addEventListener('mouseup', (e) => {
    if (e.button !== 2 || !rmbState) return;
    const state = rmbState; rmbState = null;
    if (!state.moved) {
      // двойной клик ПКМ по пустому фону → сброс зума
      const isEmpty = state.target === board || state.target === world || state.target.tagName === 'svg';
      if (isEmpty) {
        const now = Date.now();
        if (now - lastRmbClickT < 400) { resetZoom(); lastRmbClickT = 0; }
        else lastRmbClickT = now;
      }
    }
  });
  // Колесо: зум вокруг курсора. Если курсор над редактируемым текстом со скроллом — не зумим.
  board.addEventListener('wheel', (e) => {
    const t = e.target;
    if (t && t.closest) {
      const editable = t.closest('[contenteditable="true"]');
      if (editable && editable.scrollHeight > editable.clientHeight) return; // даём скроллить текст
    }
    e.preventDefault();
    const factor = Math.exp(-e.deltaY * 0.0015);
    setZoomAt(zoom * factor, e.clientX, e.clientY);
  }, { passive: false });

  // ---------- touch: pan + pinch-zoom ----------
  let touchPan = null;   // { startX, startY, lastX, lastY, moved }
  let pinchState = null; // { dist, midX, midY }

  function isEmptyBoardTarget(el) {
    if (!el) return false;
    if (el.closest && el.closest('.note')) return false;
    if (el.classList && el.classList.contains('wire-label')) return false;
    if (el.classList && el.classList.contains('wire')) return false;
    return el === board || el === world || el === selectionEl || el === wires;
  }

  board.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      touchPan = null;
      const t0 = e.touches[0], t1 = e.touches[1];
      pinchState = {
        dist: Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY),
        midX: (t0.clientX + t1.clientX) / 2,
        midY: (t0.clientY + t1.clientY) / 2,
      };
      e.preventDefault();
      return;
    }
    if (e.touches.length === 1) {
      const t = e.touches[0];
      if (isEmptyBoardTarget(document.elementFromPoint(t.clientX, t.clientY))) {
        e.preventDefault();
        clearWireSelection();
        touchPan = { startX: t.clientX, startY: t.clientY, lastX: t.clientX, lastY: t.clientY, moved: false };
      }
    }
  }, { passive: false });

  board.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && pinchState) {
      e.preventDefault();
      const t0 = e.touches[0], t1 = e.touches[1];
      const newDist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
      const midX = (t0.clientX + t1.clientX) / 2;
      const midY = (t0.clientY + t1.clientY) / 2;
      if (pinchState.dist > 1) setZoomAt(zoom * newDist / pinchState.dist, midX, midY);
      tx += midX - pinchState.midX;
      ty += midY - pinchState.midY;
      pinchState = { dist: newDist, midX, midY };
      applyTransform();
      return;
    }
    if (e.touches.length === 1 && touchPan) {
      e.preventDefault();
      const t = e.touches[0];
      const dx = t.clientX - touchPan.lastX, dy = t.clientY - touchPan.lastY;
      touchPan.lastX = t.clientX; touchPan.lastY = t.clientY;
      if (!touchPan.moved && (Math.abs(t.clientX - touchPan.startX) > 6 || Math.abs(t.clientY - touchPan.startY) > 6)) {
        touchPan.moved = true;
      }
      tx += dx; ty += dy;
      applyTransform();
    }
  }, { passive: false });

  board.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) pinchState = null;
    if (e.touches.length === 0 && touchPan) {
      if (!touchPan.moved) {
        // Tap на пустой доске → создать карточку по центру тапа
        const a = screenToWorld(touchPan.startX, touchPan.startY);
        const noteW = Math.min(240, window.innerWidth * 0.72);
        const note = createNote(a.x - noteW / 2, a.y - 60, noteW, 140);
        note.querySelector('.pane.idea').focus();
      }
      touchPan = null;
    }
  });

  // ---------- note element ----------
  function createNote(x, y, w, h, html = '', id = null, z = null, title = '', algorithm = '', view = 'idea') {
    const note = document.createElement('div');
    const noteId = id || uid('n');
    note.className = 'note';
    note.dataset.id = noteId;
    note.style.left = x + 'px';
    note.style.top = y + 'px';
    note.style.width = w + 'px';
    note.style.height = h + 'px';
    if (z) { note.style.zIndex = z; zTop = Math.max(zTop, z); }

    note.dataset.view = 'idea';
    note.innerHTML = `
      <div class="bar">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="title" contenteditable="true" spellcheck="true" title="Подписать идею"></div>
        <div class="bar-right">
          <div class="link" title="Создать стрелку: тяните на другую карточку">↗</div>
          <div class="del" title="Удалить">×</div>
        </div>
      </div>
      <div class="panes">
        <div class="pane idea" contenteditable="true" spellcheck="true"></div>
        <div class="pane algorithm" hidden></div>
      </div>
      <div class="tabs">
        <button class="seg-btn vt-toggle" type="button" title="Показать схему">
          <svg class="ic-diagram" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><path d="M10 6.5h4a3 3 0 0 1 3 3v4.5"/></svg>
          <svg class="ic-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h10"/></svg>
          <span class="lbl">схема</span><span class="spinner"></span>
        </button>
        <span class="tabs-gap"></span>
        <button class="icon-btn btn-regen" type="button" title="Перегенерировать схему" aria-label="Перегенерировать" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
        </button>
        <button class="icon-btn btn-expand" type="button" title="Открыть во весь экран" aria-label="Развернуть" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
        </button>
      </div>
      <div class="handle n"></div><div class="handle s"></div>
      <div class="handle e"></div><div class="handle w"></div>
      <div class="handle ne"></div><div class="handle nw"></div>
      <div class="handle se"></div><div class="handle sw"></div>
    `;
    world.appendChild(note);
    notes.set(noteId, { el: note });

    // Карточка под курсором — чтобы удалять её клавишей Delete
    note.addEventListener('mouseenter', () => { hoveredNote = noteId; });
    note.addEventListener('mouseleave', () => { if (hoveredNote === noteId) hoveredNote = null; });

    const paneIdea  = note.querySelector('.pane.idea');
    const paneAlgo  = note.querySelector('.pane.algorithm');
    const vtToggle  = note.querySelector('.vt-toggle');
    const btnRegen  = note.querySelector('.btn-regen');
    const btnExpand = note.querySelector('.btn-expand');
    // Превью схемы само вписывается при любом изменении размера панели
    // (ресайз карточки, показ/скрытие, окно). Безопасно при пустой панели.
    new ResizeObserver(() => { if (!paneAlgo.hidden) fitPreview(paneAlgo); }).observe(paneAlgo);
    if (html) paneIdea.innerHTML = html;
    const titleEl = note.querySelector('.title');
    if (title) titleEl.textContent = title;

    // Подпись идеи — простой однострочный (Shift+Enter — перенос, Enter — закрепить)
    titleEl.addEventListener('input', () => saveAll());
    titleEl.addEventListener('focus', () => bringToFront(note));
    titleEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); titleEl.blur(); }
      if (e.key === 'Escape') { e.preventDefault(); titleEl.blur(); }
    });
    titleEl.addEventListener('paste', (e) => {
      e.preventDefault();
      const t = (e.clipboardData || window.clipboardData).getData('text/plain').replace(/\s+/g, ' ').trim();
      document.execCommand('insertText', false, t);
    });
    // Чтобы клик по подписи не уводил в drag карточки
    titleEl.addEventListener('mousedown', (e) => e.stopPropagation());

    // Универсальные обработчики на обе панели
    [paneIdea, paneAlgo].forEach(pane => {
      pane.addEventListener('focus', () => {
        document.querySelectorAll('.note.focused').forEach(n => n.classList.remove('focused'));
        note.classList.add('focused');
        bringToFront(note);
      });
      pane.addEventListener('input', () => {
        autoGrowIfNeeded(note);
        updateWiresFor(noteId);
        saveAll();
      });
      pane.addEventListener('blur', () => {
        setTimeout(() => { if (!fmt.matches(':hover')) hideFmt(); }, 80);
      });
    });

    // ---- Авто-подпись карточки через Claude ----
    // Когда идея написана, а заголовок ещё пуст — просим модель придумать его.
    function maybeAutoTitle() {
      if (titleEl.textContent.trim()) return;       // заголовок уже есть
      if (note.dataset.titling === '1') return;     // уже генерируем
      const idea = paneIdea.innerText.trim();
      if (idea.length < 12) return;                 // слишком мало текста
      note.dataset.titling = '1';
      note.classList.add('titling');
      generateTitle(idea)
        .then(t => {
          if (t && !titleEl.textContent.trim()) { titleEl.textContent = t; saveAll(); }
        })
        .catch(() => { /* молча — авто-подпись не критична */ })
        .finally(() => { note.dataset.titling = '0'; note.classList.remove('titling'); });
    }
    paneIdea.addEventListener('blur', maybeAutoTitle);

    // ---- Одна кнопка: текст ⇄ схема ----
    function setView(name) {
      note.dataset.view = name;
      paneIdea.hidden = (name !== 'idea');
      paneAlgo.hidden = (name !== 'algorithm');
      // В режиме текста кнопка зовёт в схему, в режиме схемы — назад к тексту.
      const onDiagram = (name === 'algorithm');
      vtToggle.querySelector('.lbl').textContent = onDiagram ? 'текст' : 'схема';
      vtToggle.title = onDiagram ? 'Вернуться к тексту' : 'Показать схему';
      vtToggle.classList.toggle('on-diagram', onDiagram);
      btnRegen.hidden  = !onDiagram;
      btnExpand.hidden = !onDiagram;
      if (onDiagram) fitPreview(paneAlgo);
      // фокус на текстовой панели, только если он уже был внутри карточки
      if (name === 'idea' && note.contains(document.activeElement)) paneIdea.focus();
      updateWiresFor(noteId);
    }

    // Построить (или показать кэш) схему. force=true — перегенерировать.
    async function ensureDiagram(force) {
      if (!force && note.dataset.mermaidSrc) {
        if (!paneAlgo.querySelector('svg')) await renderMermaidInto(paneAlgo, note.dataset.mermaidSrc);
        setView('algorithm');
        saveAll();
        return;
      }
      const idea = paneIdea.innerText.trim();
      if (!idea) { alert('Сначала запишите идею в этой карточке.'); return; }
      vtToggle.classList.add('loading');
      vtToggle.disabled = true;
      try {
        const src = await generateMermaid(idea);
        note.dataset.mermaidSrc = src;
        await renderMermaidInto(paneAlgo, src);
        setView('algorithm');
        saveAll();
        maybeAutoTitle();
      } catch (err) {
        alert('Не удалось получить диаграмму: ' + (err && err.message ? err.message : err));
      } finally {
        vtToggle.classList.remove('loading');
        vtToggle.disabled = false;
      }
    }

    [vtToggle, btnRegen, btnExpand].forEach(b => b.addEventListener('mousedown', e => e.stopPropagation()));
    // Главная кнопка: на тексте → построить/показать схему; на схеме → к тексту.
    vtToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      if (note.dataset.view === 'algorithm') { setView('idea'); saveAll(); }
      else { ensureDiagram(false); }
    });
    btnRegen.addEventListener('click', (e) => { e.stopPropagation(); ensureDiagram(true); });
    btnExpand.addEventListener('click', (e) => { e.stopPropagation(); openDiagramViewer(noteId); });
    // Клик по самому превью — открыть просмотрщик
    paneAlgo.addEventListener('click', (e) => {
      if (paneAlgo.classList.contains('diagram-error')) return;
      if (!note.dataset.mermaidSrc) return;
      e.stopPropagation();
      openDiagramViewer(noteId);
    });

    // drag move from header
    const bar = note.querySelector('.bar');
    bar.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('del')) return;
      if (e.target.classList.contains('link')) return; // handled separately
      e.preventDefault();
      bringToFront(note);
      const sx = e.clientX, sy = e.clientY;
      const ox = parseFloat(note.style.left), oy = parseFloat(note.style.top);
      const onMove = (ev) => {
        note.style.left = (ox + (ev.clientX - sx) / zoom) + 'px';
        note.style.top  = (oy + (ev.clientY - sy) / zoom) + 'px';
        updateWiresFor(noteId);
      };
      const onUp = () => {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        saveAll();
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
    bar.addEventListener('touchstart', (e) => {
      if (e.target.classList.contains('del') || e.target.classList.contains('link')) return;
      if (e.touches.length !== 1) return;
      e.preventDefault();
      e.stopPropagation();
      bringToFront(note);
      const t = e.touches[0];
      const sx = t.clientX, sy = t.clientY;
      const ox = parseFloat(note.style.left), oy = parseFloat(note.style.top);
      const onMove = (ev) => {
        ev.preventDefault();
        const tt = ev.touches[0];
        note.style.left = (ox + (tt.clientX - sx) / zoom) + 'px';
        note.style.top  = (oy + (tt.clientY - sy) / zoom) + 'px';
        updateWiresFor(noteId);
      };
      const onEnd = () => {
        bar.removeEventListener('touchmove', onMove);
        bar.removeEventListener('touchend', onEnd);
        saveAll();
      };
      bar.addEventListener('touchmove', onMove, { passive: false });
      bar.addEventListener('touchend', onEnd);
    }, { passive: false });

    // connection drag from the ↗ port
    const linkBtn = note.querySelector('.link');
    linkBtn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      startConnectionDrag(noteId, e.clientX, e.clientY);
    });
    linkBtn.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      e.preventDefault();
      e.stopPropagation();
      const t = e.touches[0];
      startConnectionDrag(noteId, t.clientX, t.clientY);
    }, { passive: false });

    // delete
    note.querySelector('.del').addEventListener('click', () => {
      removeNote(noteId);
    });

    // resize
    note.querySelectorAll('.handle').forEach(h => {
      h.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        bringToFront(note);
        const dir = [...h.classList].find(c => c !== 'handle');
        const sx = e.clientX, sy = e.clientY;
        const ox = parseFloat(note.style.left), oy = parseFloat(note.style.top);
        const ow = parseFloat(note.style.width), oh = parseFloat(note.style.height);
        const onMove = (ev) => {
          let dx = (ev.clientX - sx) / zoom, dy = (ev.clientY - sy) / zoom;
          let nx = ox, ny = oy, nw = ow, nh = oh;
          if (dir.includes('e')) nw = Math.max(MIN_W, ow + dx);
          if (dir.includes('s')) nh = Math.max(MIN_H, oh + dy);
          if (dir.includes('w')) { nw = Math.max(MIN_W, ow - dx); nx = ox + (ow - nw); }
          if (dir.includes('n')) { nh = Math.max(MIN_H, oh - dy); ny = oy + (oh - nh); }
          note.style.left = nx + 'px'; note.style.top = ny + 'px';
          note.style.width = nw + 'px'; note.style.height = nh + 'px';
          updateWiresFor(noteId);
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          saveAll();
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });
      h.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        e.preventDefault();
        e.stopPropagation();
        bringToFront(note);
        const dir = [...h.classList].find(c => c !== 'handle');
        const t = e.touches[0];
        const sx = t.clientX, sy = t.clientY;
        const ox = parseFloat(note.style.left), oy = parseFloat(note.style.top);
        const ow = parseFloat(note.style.width), oh = parseFloat(note.style.height);
        const onMove = (ev) => {
          ev.preventDefault();
          const tt = ev.touches[0];
          let dx = (tt.clientX - sx) / zoom, dy = (tt.clientY - sy) / zoom;
          let nx = ox, ny = oy, nw = ow, nh = oh;
          if (dir.includes('e')) nw = Math.max(MIN_W, ow + dx);
          if (dir.includes('s')) nh = Math.max(MIN_H, oh + dy);
          if (dir.includes('w')) { nw = Math.max(MIN_W, ow - dx); nx = ox + (ow - nw); }
          if (dir.includes('n')) { nh = Math.max(MIN_H, oh - dy); ny = oy + (oh - nh); }
          note.style.left = nx + 'px'; note.style.top = ny + 'px';
          note.style.width = nw + 'px'; note.style.height = nh + 'px';
          updateWiresFor(noteId);
        };
        const onEnd = () => {
          h.removeEventListener('touchmove', onMove);
          h.removeEventListener('touchend', onEnd);
          saveAll();
        };
        h.addEventListener('touchmove', onMove, { passive: false });
        h.addEventListener('touchend', onEnd);
      }, { passive: false });
    });

    // Восстановление сохранённой Mermaid-диаграммы (параметр algorithm = mermaid-источник)
    if (algorithm) note.dataset.mermaidSrc = algorithm;
    if (view === 'algorithm' && note.dataset.mermaidSrc) {
      setView('algorithm');
      renderMermaidInto(paneAlgo, note.dataset.mermaidSrc);
    } else {
      // Без диаграммы карточка всегда в тексте — пустая панель схемы не маячит.
      setView('idea');
    }

    bringToFront(note);
    saveAll();
    return note;
  }

  function removeNote(noteId) {
    const rec = notes.get(noteId);
    if (!rec) return;
    if (hoveredNote === noteId) hoveredNote = null;
    rec.el.remove();
    notes.delete(noteId);
    // remove attached connections
    [...connections.entries()].forEach(([cid, c]) => {
      if (c.from === noteId || c.to === noteId) removeConnection(cid);
    });
    saveAll();
    updateContextGlows();
  }

  // Порог авто-роста карточки: дальше — появляется внутренний скролл текста.
  function maxNoteHeight() {
    return Math.min(640, Math.max(220, window.innerHeight * 0.8 / Math.max(zoom, 0.0001)));
  }
  function autoGrowIfNeeded(note) {
    const t = note.querySelector('.pane:not([hidden])');
    if (!t) return;
    if (t.scrollHeight > t.clientHeight) {
      const cap = maxNoteHeight();
      const curH = parseFloat(note.style.height);
      if (curH >= cap) return; // достигли порога — пусть pane скроллится
      const extra = t.scrollHeight - t.clientHeight;
      const newH = Math.min(cap, curH + extra + 2);
      if (newH > curH) note.style.height = newH + 'px';
    }
  }

  function bringToFront(note) {
    note.style.zIndex = ++zTop;
  }

  // ---------- connections (arrows) ----------
  function startConnectionDrag(fromId, startX, startY) {
    const fromEl = notes.get(fromId).el;
    const ghost = document.createElementNS(SVG_NS, 'path');
    ghost.setAttribute('class', 'wire ghost');
    ghost.setAttribute('fill', 'none');
    ghost.setAttribute('stroke', 'var(--arrow)');
    ghost.setAttribute('stroke-width', '2');
    ghost.setAttribute('marker-end', 'url(#arrow-head)');
    wires.appendChild(ghost);

    function move(x, y) {
      const hovered = noteAtPoint(x, y, fromId);
      document.querySelectorAll('.note.link-target').forEach(n => n.classList.remove('link-target'));
      chatPanel.classList.remove('link-target-panel');
      if (hovered) {
        if (hovered === chatPanel) chatPanel.classList.add('link-target-panel');
        else hovered.classList.add('link-target');
      }
      ghost.setAttribute('d', curvePath(anchorPoint(fromEl, x, y), { x, y }));
    }
    function finish(x, y) {
      ghost.remove();
      const target = noteAtPoint(x, y, fromId);
      document.querySelectorAll('.note.link-target').forEach(n => n.classList.remove('link-target'));
      chatPanel.classList.remove('link-target-panel');
      if (target) {
        const toId = (target === chatPanel) ? CHAT_PANEL_ID : target.dataset.id;
        if (toId && toId !== fromId) {
          const exists = [...connections.values()].some(c => c.from === fromId && c.to === toId);
          if (!exists) { createConnection(fromId, toId, ''); updateAllWires(); saveAll(); updateContextGlows(); }
        }
      }
    }
    const onMouseMove = (ev) => move(ev.clientX, ev.clientY);
    const onMouseUp = (ev) => {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
      finish(ev.clientX, ev.clientY);
    };
    const onTouchMove = (ev) => { ev.preventDefault(); const t = ev.touches[0]; move(t.clientX, t.clientY); };
    const onTouchEnd = (ev) => {
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchend', onTouchEnd);
      const t = ev.changedTouches[0];
      finish(t.clientX, t.clientY);
    };
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    window.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('touchend', onTouchEnd);
    move(startX, startY);
  }

  function noteAtPoint(x, y, excludeId) {
    if (chatPanelOpen && excludeId !== CHAT_PANEL_ID) {
      if (isOnChatPanel(x, y)) return chatPanel;
    }
    // hit-test all notes (topmost wins)
    const arr = [...notes.values()].sort((a, b) =>
      parseFloat(b.el.style.zIndex || 0) - parseFloat(a.el.style.zIndex || 0));
    for (const { el } of arr) {
      if (el.dataset.id === excludeId) continue;
      const r = el.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return el;
    }
    return null;
  }

  // Pick a point on the border of `el` closest to (tx, ty) — gives clean docking like Blender nodes.
  function anchorPoint(el, tx, ty) {
    const r = el.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dx = tx - cx, dy = ty - cy;
    if (dx === 0 && dy === 0) return { x: r.right, y: cy };
    const hw = r.width / 2, hh = r.height / 2;
    const sx = Math.abs(dx) / hw, sy = Math.abs(dy) / hh;
    const s = Math.max(sx, sy);
    return { x: cx + dx / s, y: cy + dy / s };
  }

  function curvePath(a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.hypot(dx, dy);
    // horizontal-ish curvature for a node-graph feel
    const offset = Math.min(140, Math.max(40, dist * 0.4));
    // If start/end are mostly horizontal, bend horizontally; otherwise vertically.
    const horiz = Math.abs(dx) >= Math.abs(dy);
    const c1 = horiz
      ? { x: a.x + Math.sign(dx || 1) * offset, y: a.y }
      : { x: a.x, y: a.y + Math.sign(dy || 1) * offset };
    const c2 = horiz
      ? { x: b.x - Math.sign(dx || 1) * offset, y: b.y }
      : { x: b.x, y: b.y - Math.sign(dy || 1) * offset };
    return `M ${a.x} ${a.y} C ${c1.x} ${c1.y} ${c2.x} ${c2.y} ${b.x} ${b.y}`;
  }

  function createConnection(fromId, toId, label = '', id = null) {
    const connId = id || uid('c');
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('class', 'wire');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', 'var(--arrow)');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('marker-end', 'url(#arrow-head)');
    path.dataset.id = connId;
    wires.appendChild(path);

    // Широкая невидимая дорожка поверх — большой хитбокс для клика/ПКМ/наведения
    const hit = document.createElementNS(SVG_NS, 'path');
    hit.setAttribute('class', 'wire-hit');
    hit.setAttribute('fill', 'none');
    hit.setAttribute('stroke', 'transparent');
    hit.setAttribute('stroke-width', '24');
    hit.dataset.id = connId;
    wires.appendChild(hit);

    const labelEl = document.createElement('div');
    labelEl.className = 'wire-label';
    labelEl.contentEditable = 'true';
    labelEl.spellcheck = true;
    labelEl.dataset.id = connId;
    labelEl.textContent = label || '';
    board.appendChild(labelEl);

    // hide placeholder once user starts editing/has content
    function refreshPlaceholder() {
      if (labelEl.textContent.length > 0) labelEl.classList.add('placeholder-hidden');
      else labelEl.classList.remove('placeholder-hidden');
    }
    refreshPlaceholder();

    labelEl.addEventListener('input', () => {
      const rec = connections.get(connId);
      if (rec) rec.label = labelEl.textContent;
      refreshPlaceholder();
      saveAll();
    });
    labelEl.addEventListener('focus', () => {
      selectWire(connId);
      labelEl.classList.add('placeholder-hidden');
    });
    labelEl.addEventListener('blur', () => refreshPlaceholder());
    labelEl.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { e.preventDefault(); labelEl.blur(); }
      // Enter — обычный перенос строки (как в карточке). Ctrl+Enter — закрепить.
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); labelEl.blur(); }
    });
    // paste as plain text
    labelEl.addEventListener('paste', (e) => {
      e.preventDefault();
      const t = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, t);
    });

    hit.addEventListener('click', (e) => {
      e.stopPropagation();
      selectWire(connId);
    });
    hit.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      labelEl.focus();
      // place caret at end
      const sel = window.getSelection(); const r = document.createRange();
      r.selectNodeContents(labelEl); r.collapse(false);
      sel.removeAllRanges(); sel.addRange(r);
    });
    // ПКМ по стрелке — удалить её
    hit.addEventListener('mousedown', (e) => { if (e.button === 2) e.stopPropagation(); });
    hit.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      e.stopPropagation();
      removeConnection(connId);
      saveAll();
    });
    // Подсветка при наведении (визуальная линия pointer-events:none, ловит hit)
    hit.addEventListener('mouseenter', () => path.classList.add('hover'));
    hit.addEventListener('mouseleave', () => path.classList.remove('hover'));

    connections.set(connId, { from: fromId, to: toId, label, pathEl: path, hitEl: hit, labelEl });
    return connId;
  }

  function removeConnection(connId) {
    const c = connections.get(connId);
    if (!c) return;
    c.pathEl.remove();
    if (c.hitEl) c.hitEl.remove();
    c.labelEl.remove();
    connections.delete(connId);
    updateContextGlows();
  }

  function clearWireSelection() {
    document.querySelectorAll('#wires .wire.selected').forEach(p => p.classList.remove('selected'));
  }
  function selectWire(connId) {
    clearWireSelection();
    const c = connections.get(connId);
    if (c) c.pathEl.classList.add('selected');
  }

  function updateWiresFor(noteId) {
    connections.forEach((c) => {
      if (c.from === noteId || c.to === noteId) drawWire(c);
    });
  }
  function updateAllWires() {
    connections.forEach(drawWire);
  }
  function drawWire(c) {
    const fromEl = notes.get(c.from)?.el;
    const toEl = c.to === CHAT_PANEL_ID
      ? (chatPanelOpen ? chatPanel : null)
      : notes.get(c.to)?.el;
    if (!fromEl || !toEl) {
      if (c.pathEl) c.pathEl.setAttribute('d', '');
      if (c.hitEl)  c.hitEl.setAttribute('d', '');
      if (c.labelEl) c.labelEl.style.display = 'none';
      return;
    }
    c.labelEl.style.display = '';
    const fc = centerOf(fromEl), tc = centerOf(toEl);
    const a = anchorPoint(fromEl, tc.x, tc.y);
    const b = anchorPoint(toEl, fc.x, fc.y);
    const d = curvePath(a, b);
    c.pathEl.setAttribute('d', d);
    if (c.hitEl) c.hitEl.setAttribute('d', d);
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    c.labelEl.style.left = mx + 'px';
    c.labelEl.style.top  = my + 'px';
  }
  function centerOf(el) {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  // Delete/Backspace (когда не редактируем текст):
  //  — выбранную стрелку,
  //  — иначе карточку под курсором (наведи мышь + Delete).
  document.addEventListener('keydown', (e) => {
    const active = document.activeElement;
    const editingText = active && active.isContentEditable;
    if (editingText || (e.key !== 'Delete' && e.key !== 'Backspace')) return;
    const selected = document.querySelector('#wires .wire.selected');
    if (selected) {
      e.preventDefault();
      removeConnection(selected.dataset.id);
      saveAll();
      return;
    }
    if (e.key === 'Delete' && hoveredNote && notes.has(hoveredNote)) {
      e.preventDefault();
      removeNote(hoveredNote);
    }
  });

  // click empty board area clears wire selection (already done in mousedown)
  // ---------- formatting popover ----------
  function showFmtFromSelection() {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) { hideFmt(); return; }
    const anchorNode = sel.anchorNode;
    if (!anchorNode) { hideFmt(); return; }
    const host = (anchorNode.nodeType === 1 ? anchorNode : anchorNode.parentElement).closest('.pane');
    if (!host) { hideFmt(); return; }
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    if (!rect.width && !rect.height) { hideFmt(); return; }
    fmt.classList.add('show');
    const top = Math.max(8, rect.top - fmt.offsetHeight - 8);
    let left = rect.left + rect.width / 2 - fmt.offsetWidth / 2;
    left = Math.max(8, Math.min(window.innerWidth - fmt.offsetWidth - 8, left));
    fmt.style.top = top + 'px';
    fmt.style.left = left + 'px';
  }
  function hideFmt() { fmt.classList.remove('show'); }

  document.addEventListener('selectionchange', () => {
    requestAnimationFrame(showFmtFromSelection);
  });

  fmt.addEventListener('mousedown', (e) => e.preventDefault());
  fmt.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const cmd = btn.dataset.cmd;
    const arg = btn.dataset.arg || null;
    document.execCommand(cmd, false, arg);
    requestAnimationFrame(showFmtFromSelection);
    saveAll();
  });

  // keyboard shortcuts inside notes
  document.addEventListener('keydown', (e) => {
    const active = document.activeElement;
    if (!active || !active.classList || !active.classList.contains('pane')) return;
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey) {
      const k = e.key.toLowerCase();
      if (k === 'b') { e.preventDefault(); document.execCommand('bold'); saveAll(); }
      else if (k === 'i') { e.preventDefault(); document.execCommand('italic'); saveAll(); }
      else if (k === 'u') { e.preventDefault(); document.execCommand('underline'); saveAll(); }
    }
    if (e.key === 'Delete' && e.ctrlKey) {
      const note = active.closest('.note');
      if (note) { e.preventDefault(); removeNote(note.dataset.id); }
    }
  });

  document.getElementById('zoomReset').addEventListener('click', resetZoom);
  document.getElementById('addNote').addEventListener('click', () => {
    const a = screenToWorld(window.innerWidth / 2, window.innerHeight / 2);
    const noteW = Math.min(240, window.innerWidth * 0.72);
    const note = createNote(a.x - noteW / 2, a.y - 60, noteW, 140);
    note.querySelector('.pane.idea').focus();
  });

  // ---------- Claude (локальный мост, авторизация по подписке) ----------
  const MODEL_STORAGE = 'aiboard.apiModel';
  const DEFAULT_MODEL = 'sonnet';
  // Доска всегда ходит в свой же сервер (proxy.py) — он вызывает Claude Code.
  const API_URL = '/v1/messages';
  function getApiModel() { return (localStorage.getItem(MODEL_STORAGE) || DEFAULT_MODEL).trim(); }
  // Старые ключи/эндпоинты из прошлой схемы авторизации больше не нужны.
  localStorage.removeItem('aiboard.anthropicKey');
  localStorage.removeItem('aiboard.apiUrl');

  // ===== Авторизация: баннер «Войти» в чате (выход — `claude auth logout`) =====
  const chatAuthBanner = document.getElementById('chat-auth-banner');
  const chatAuthText   = document.getElementById('chat-auth-text');
  const chatAuthLogin  = document.getElementById('chat-auth-login');
  let authLoggedIn = null; // null — статус ещё не проверяли

  function renderAuth() {
    chatAuthBanner.hidden = authLoggedIn !== false;
  }

  async function checkAuth() {
    try {
      const r = await fetch('/auth/status');
      authLoggedIn = !!(await r.json()).loggedIn;
    } catch (_) {
      authLoggedIn = false;
    }
    renderAuth();
    return authLoggedIn;
  }

  let authPollTimer = null;
  function pollAuthUntilLoggedIn() {
    if (authPollTimer) return;
    let tries = 0;
    chatAuthText.textContent = 'Завершите вход в открывшемся окне браузера…';
    authPollTimer = setInterval(async () => {
      tries++;
      const ok = await checkAuth();
      if (ok || tries > 100) {
        clearInterval(authPollTimer);
        authPollTimer = null;
        if (ok) {
          chatAuthText.textContent = 'Claude не подключён';
          appendChatMessage('assistant', 'Готово — вход выполнен, можно общаться!');
        } else {
          chatAuthText.textContent = 'Вход не завершён — попробуйте ещё раз';
        }
      }
    }, 3000);
  }

  async function startLogin() {
    chatAuthLogin.disabled = true;
    try {
      const r = await fetch('/auth/login', { method: 'POST' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      pollAuthUntilLoggedIn();
    } catch (e) {
      alert('Не удалось запустить вход: ' + e.message + '\nПроверьте, что доска запущена через start-proxy.bat.');
    } finally {
      setTimeout(() => { chatAuthLogin.disabled = false; }, 3000);
    }
  }

  chatAuthLogin.addEventListener('click', startLogin);
  checkAuth();

  // Просим у модели код Mermaid-диаграммы по тексту идеи.
  // Промпт жёстко держит схему узкой и читаемой: ориентация сверху-вниз,
  // мало узлов, родственные пункты — списком внутри одного узла (а не веером).
  async function generateMermaid(idea) {
    const model = getApiModel();
    const userPrompt =
      'Преобразуй идею в наглядную диаграмму Mermaid. ' +
      'Верни ТОЛЬКО валидный код Mermaid — без markdown-заборов ``` и без пояснений.\n\n' +
      'Правила компоновки (соблюдай строго, иначе схема станет нечитаемой):\n' +
      '1. Ориентация сверху вниз — первая строка "flowchart TD". ' +
      '(Исключения: если идея — это диалог/последовательность во времени, используй "sequenceDiagram"; ' +
      'если это набор состояний/статусов — "stateDiagram-v2". В остальных случаях — flowchart TD.)\n' +
      '2. Не больше 6 узлов. Родственные пункты НЕ раскидывай по отдельным узлам, ' +
      'а объединяй в ОДИН узел списком: переносы строк через <br/>, каждый пункт с «• ». ' +
      'Пример: A["Питание<br/>• дефицит 500 ккал<br/>• белок 1.6 г/кг<br/>• вода 2 л"].\n' +
      '3. Никакого «веера»: из одного узла выходит максимум 2–3 стрелки. ' +
      'Длинные перечисления делай вертикальной цепочкой A --> B --> C, а не параллельно вширь.\n' +
      '4. Этапы и фазы оборачивай в subgraph — они укладываются вертикально.\n' +
      '5. Подписи короткие, на русском. Текст узлов всегда в двойных кавычках "...".\n\n' +
      'Идея:\n"""\n' + idea + '\n"""';
    let res;
    try {
      res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          model,
          max_tokens: 1500,
          messages: [{ role: 'user', content: userPrompt }],
        }),
      });
    } catch (e) {
      // fetch() бросает TypeError без подробностей. Подскажем где смотреть.
      throw new Error(
        'Запрос не дошёл (' + e.name + ': ' + e.message + ').\n\n' +
        'Проверьте, что доска запущена через start-proxy.bat — локальный сервер на http://localhost:8787 должен работать.'
      );
    }
    if (res.status === 401) {
      authLoggedIn = false;
      renderAuth();
      throw new Error('Claude не подключён — нажмите «Войти» вверху чата.');
    }
    if (!res.ok) {
      let detail = '';
      try { detail = (await res.json()).error?.message || ''; } catch (_) {}
      throw new Error('HTTP ' + res.status + (detail ? ' — ' + detail : ''));
    }
    const data = await res.json();
    const block = (data.content || []).find(b => b.type === 'text');
    const txt = block?.text || data.choices?.[0]?.message?.content; // на случай OpenAI-совместимого прокси
    if (!txt) throw new Error('Пустой ответ модели');
    // Срезаем возможные ```mermaid / ``` обёртки.
    return String(txt).trim()
      .replace(/^```(?:mermaid)?\s*/i, '')
      .replace(/\s*```$/i, '')
      .trim();
  }

  // Ждём подгрузки mermaid (module-скрипт в <head>) и рендерим SVG в панель.
  let mermaidSeq = 0;
  async function getMermaid() {
    for (let i = 0; i < 50 && !window.mermaid; i++) {
      await new Promise(r => setTimeout(r, 100));
    }
    if (!window.mermaid) throw new Error('mermaid не загрузился (нет интернета?)');
    return window.mermaid;
  }
  // Натуральный размер SVG-диаграммы (из viewBox, иначе из bbox).
  function svgNaturalSize(svg) {
    const vb = svg.viewBox && svg.viewBox.baseVal;
    if (vb && vb.width && vb.height) return { w: vb.width, h: vb.height };
    try { const b = svg.getBBox(); if (b.width && b.height) return { w: b.width, h: b.height }; } catch (_) {}
    return { w: svg.clientWidth || 0, h: svg.clientHeight || 0 };
  }

  // Минимальный читаемый масштаб превью: ниже не ужимаем — лучше показать
  // фрагмент с намёком «разверните», чем нечитаемую мелочь.
  const PREVIEW_MIN_SCALE = 0.62;
  function fitPreview(paneEl) {
    const svg = paneEl.querySelector('svg');
    if (!svg) { paneEl.classList.remove('cropped'); return; }
    const { w: nw, h: nh } = svgNaturalSize(svg);
    const cw = paneEl.clientWidth, ch = paneEl.clientHeight;
    if (!nw || !nh || !cw || !ch) return;
    svg.style.maxWidth = 'none';
    svg.style.width  = nw + 'px';
    svg.style.height = nh + 'px';
    const fit = Math.min(cw / nw, ch / nh);
    const scale = Math.min(1, Math.max(fit, PREVIEW_MIN_SCALE));
    svg.style.transform = 'scale(' + scale + ')';
    paneEl.classList.toggle('cropped', fit < PREVIEW_MIN_SCALE - 0.005);
  }

  async function renderMermaidInto(paneEl, src) {
    paneEl.classList.remove('diagram-error', 'cropped');
    try {
      const mermaid = await getMermaid();
      const { svg } = await mermaid.render('mmd-' + (++mermaidSeq), src);
      paneEl.innerHTML = svg
        + '<span class="expand-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg></span>';
      fitPreview(paneEl);
    } catch (err) {
      paneEl.classList.add('diagram-error');
      paneEl.textContent =
        'Ошибка отрисовки диаграммы:\n' + (err && err.message ? err.message : err) +
        '\n\n↻ — перегенерировать.';
    }
  }

  // ===== Просмотрщик диаграммы во весь экран (зум к курсору + панорама) =====
  const dvOverlay = document.getElementById('diagram-viewer');
  const dvStage   = document.getElementById('dv-stage');
  const dvCanvas  = document.getElementById('dv-canvas');
  const dvTitle   = document.getElementById('dv-title');
  let dvNoteId = null;
  let dvScale = 1, dvX = 0, dvY = 0, dvNat = { w: 1, h: 1 };

  function dvApply() {
    dvCanvas.style.transform = 'translate(' + dvX + 'px,' + dvY + 'px) scale(' + dvScale + ')';
  }
  function dvFit() {
    const r = dvStage.getBoundingClientRect();
    const fit = Math.min(r.width / dvNat.w, r.height / dvNat.h) * 0.92;
    dvScale = fit > 0 ? fit : 1;
    dvX = (r.width  - dvNat.w * dvScale) / 2;
    dvY = (r.height - dvNat.h * dvScale) / 2;
    dvApply();
  }
  function dv100() {
    const r = dvStage.getBoundingClientRect();
    dvScale = 1;
    dvX = (r.width  - dvNat.w) / 2;
    dvY = (r.height - dvNat.h) / 2;
    dvApply();
  }
  async function dvRenderSrc(src) {
    dvCanvas.classList.remove('diagram-error');
    try {
      const mermaid = await getMermaid();
      const { svg } = await mermaid.render('dv-' + (++mermaidSeq), src);
      dvCanvas.innerHTML = svg;
      const s = dvCanvas.querySelector('svg');
      dvNat = svgNaturalSize(s);
      s.style.maxWidth = 'none';
      s.style.width  = dvNat.w + 'px';
      s.style.height = dvNat.h + 'px';
      dvFit();
    } catch (err) {
      dvCanvas.classList.add('diagram-error');
      dvCanvas.textContent = 'Ошибка отрисовки: ' + (err && err.message ? err.message : err);
    }
  }
  function openDiagramViewer(noteId) {
    const rec = notes.get(noteId);
    if (!rec || !rec.el.dataset.mermaidSrc) return;
    dvNoteId = noteId;
    dvTitle.textContent = rec.el.querySelector('.title')?.textContent?.trim() || 'Диаграмма';
    dvOverlay.classList.add('show');
    dvRenderSrc(rec.el.dataset.mermaidSrc);
  }
  function closeDiagramViewer() {
    dvOverlay.classList.remove('show');
    dvNoteId = null;
  }

  document.getElementById('dv-fit').addEventListener('click', dvFit);
  document.getElementById('dv-100').addEventListener('click', dv100);
  document.getElementById('dv-close').addEventListener('click', closeDiagramViewer);

  document.getElementById('dv-copy').addEventListener('click', async (e) => {
    const rec = notes.get(dvNoteId);
    if (!rec) return;
    try {
      await navigator.clipboard.writeText(rec.el.dataset.mermaidSrc || '');
      const btn = e.currentTarget;
      btn.classList.add('done');
      setTimeout(() => btn.classList.remove('done'), 1200);
    } catch (_) { alert('Не удалось скопировать (браузер запретил доступ к буферу).'); }
  });

  const dvRegenBtn = document.getElementById('dv-regen');
  dvRegenBtn.addEventListener('click', async () => {
    const rec = notes.get(dvNoteId);
    if (!rec) return;
    const idea = rec.el.querySelector('.pane.idea')?.innerText.trim();
    if (!idea) { alert('В карточке нет текста идеи.'); return; }
    dvRegenBtn.classList.add('spinning');
    try {
      const src = await generateMermaid(idea);
      rec.el.dataset.mermaidSrc = src;
      await dvRenderSrc(src);
      const pane = rec.el.querySelector('.pane.algorithm');
      if (pane) await renderMermaidInto(pane, src);  // обновляем и превью карточки
      saveAll();
    } catch (err) {
      alert('Не удалось перегенерировать: ' + (err && err.message ? err.message : err));
    } finally {
      dvRegenBtn.classList.remove('spinning');
    }
  });

  // Зум колесом — к точке под курсором
  dvStage.addEventListener('wheel', (e) => {
    e.preventDefault();
    const r = dvStage.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const factor = Math.exp(-e.deltaY * 0.0015);
    const ns = Math.min(8, Math.max(0.08, dvScale * factor));
    dvX = mx - (mx - dvX) * (ns / dvScale);
    dvY = my - (my - dvY) * (ns / dvScale);
    dvScale = ns;
    dvApply();
  }, { passive: false });

  // Панорама перетаскиванием
  dvStage.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    e.preventDefault();
    const sx = e.clientX, sy = e.clientY, ox = dvX, oy = dvY;
    dvStage.classList.add('grabbing');
    const mv = (ev) => { dvX = ox + (ev.clientX - sx); dvY = oy + (ev.clientY - sy); dvApply(); };
    const up = () => {
      window.removeEventListener('mousemove', mv);
      window.removeEventListener('mouseup', up);
      dvStage.classList.remove('grabbing');
    };
    window.addEventListener('mousemove', mv);
    window.addEventListener('mouseup', up);
  });
  dvStage.addEventListener('dblclick', dvFit);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && dvOverlay.classList.contains('show')) closeDiagramViewer();
  });

  // Короткий заголовок карточки по тексту идеи (для авто-подписи).
  async function generateTitle(idea) {
    const model = getApiModel();
    const userPrompt = 'Придумай очень короткий заголовок (2–5 слов) для этой идеи на русском. ' +
      'Без кавычек, без точки в конце, только сам заголовок.\n\nИдея:\n"""\n' + idea + '\n"""';
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        model,
        max_tokens: 60,
        messages: [{ role: 'user', content: userPrompt }],
      }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const block = (data.content || []).find(b => b.type === 'text');
    const txt = block?.text || data.choices?.[0]?.message?.content;
    if (!txt) throw new Error('Пустой ответ модели');
    return String(txt).trim().replace(/^["'«»\s]+|["'«».\s]+$/g, '').slice(0, 80);
  }

  // clear-all
  document.getElementById('clearAll').addEventListener('click', () => {
    if (!notes.size && !connections.size) return;
    if (!confirm('Удалить все карточки и стрелки?')) return;
    [...connections.keys()].forEach(removeConnection);
    [...notes.keys()].forEach(id => { notes.get(id).el.remove(); notes.delete(id); });
    saveAll();
    updateContextGlows();
  });

  // paste plain text inside notes
  document.addEventListener('paste', (e) => {
    const active = document.activeElement;
    if (!active || !active.classList || !active.classList.contains('pane')) return;
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });

  // redraw wires on window resize / scroll
  window.addEventListener('resize', updateAllWires);

  // ===== Chat panel =====

  function isOnChatPanel(x, y) {
    if (!chatPanelOpen) return false;
    const r = chatPanel.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }

  function getContextNoteIds() {
    if (!chatPanelOpen) return new Set();
    const direct = new Set();
    connections.forEach(c => {
      if (c.to === CHAT_PANEL_ID && notes.has(c.from)) direct.add(c.from);
    });
    const inContext = new Set(direct);
    connections.forEach(c => {
      if (c.from === CHAT_PANEL_ID || c.to === CHAT_PANEL_ID) return;
      if (direct.has(c.from) && notes.has(c.to))  inContext.add(c.to);
      if (direct.has(c.to)   && notes.has(c.from)) inContext.add(c.from);
    });
    return inContext;
  }

  function updateContextGlows() {
    const ctx = getContextNoteIds();
    notes.forEach(({ el }, id) => el.classList.toggle('in-context', ctx.has(id)));
    chatPanel.classList.toggle('has-context', ctx.size > 0);
    chatContextCount.textContent = ctx.size ? `${ctx.size} карт.` : '0 карточек';
    chatContextCount.classList.toggle('active', ctx.size > 0);
  }

  function toggleChatPanel() {
    chatPanelOpen = !chatPanelOpen;
    chatPanel.classList.toggle('open', chatPanelOpen);
    toggleChatBtn.classList.toggle('active', chatPanelOpen);
    updateAllWires();
    updateContextGlows();
  }

  function appendChatMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.textContent = text;
    chatMessagesEl.appendChild(div);
    chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
    return div;
  }

  function saveChatMessages() {
    try { localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chatMessages)); } catch (_) {}
  }

  function loadChatMessages() {
    try {
      const raw = localStorage.getItem(CHAT_STORAGE_KEY);
      if (!raw) return;
      chatMessages = JSON.parse(raw);
      chatMessages.forEach(m => {
        if (m.role === 'user') {
          const text = Array.isArray(m.content)
            ? m.content.filter(b => b.type === 'text').map(b => b.text).join('\n')
            : (typeof m.content === 'string' ? m.content : '');
          if (text) appendChatMessage('user', text);
        } else if (m.role === 'assistant') {
          const text = Array.isArray(m.content)
            ? m.content.filter(b => b.type === 'text').map(b => b.text).join('\n')
            : (typeof m.content === 'string' ? m.content : '');
          if (text) appendChatMessage('assistant', text);
        }
      });
    } catch (_) { chatMessages = []; }
  }

  function clearChat() {
    if (!chatMessages.length) return;
    if (!confirm('Очистить историю чата?')) return;
    chatMessages = [];
    saveChatMessages();
    chatMessagesEl.innerHTML = '';
  }

  function buildSystemPrompt() {
    const ctx = getContextNoteIds();
    if (!ctx.size) return 'Ты — ИИ-ассистент на доске идей. Помогай пользователю.';
    const parts = ['Ты — ИИ-ассистент на доске идей. Ниже — содержимое карточек, добавленных в контекст:\n'];
    const titleOf = (id) => notes.get(id)?.el.querySelector('.title')?.textContent?.trim() || '(без названия)';
    ctx.forEach(id => {
      const rec = notes.get(id);
      if (!rec) return;
      const idea  = rec.el.querySelector('.pane.idea')?.innerText?.trim() || '';
      parts.push(`### ${titleOf(id)}\n${idea}`);
    });
    // Подписи на стрелках между карточками контекста (и стрелках к самому чату).
    const links = [];
    connections.forEach(c => {
      const label = (c.label || '').trim();
      if (!label) return;
      if (c.from === CHAT_PANEL_ID || !ctx.has(c.from)) return;
      if (c.to === CHAT_PANEL_ID) {
        links.push(`«${titleOf(c.from)}» → чат: ${label}`);
      } else if (ctx.has(c.to)) {
        links.push(`«${titleOf(c.from)}» → «${titleOf(c.to)}»: ${label}`);
      }
    });
    if (links.length) {
      parts.push('### Связи (подписи стрелок)\n' + links.join('\n'));
    }
    parts.push('\nОтвечай по-русски, по делу. Учитывай связи между карточками. Можешь предложить создать новую карточку инструментом create_card.');
    return parts.join('\n\n');
  }

  async function callClaudeChat(messages) {
    const model = getApiModel();
    const t0 = performance.now();
    console.debug('[chat] ->', model, messages.length + ' сообщ.');
    let res;
    try {
      res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          model,
          max_tokens: 2048,
          system: buildSystemPrompt(),
          messages,
          tools: [{
            name: 'create_card',
            description: 'Создаёт новую карточку на доске идей с заданным заголовком и содержимым.',
            input_schema: {
              type: 'object',
              properties: {
                title:   { type: 'string', description: 'Заголовок карточки' },
                content: { type: 'string', description: 'Содержимое карточки (текст идеи)' }
              },
              required: ['title', 'content']
            }
          }]
        }),
      });
    } catch (e) {
      console.debug('[chat] сеть упала за', Math.round(performance.now() - t0) + 'мс:', e.message);
      throw new Error('Запрос не дошёл (' + e.message + '). Проверьте, что запущен start-proxy.bat.');
    }
    console.debug('[chat] <-', res.status, Math.round(performance.now() - t0) + 'мс');
    if (res.status === 401) {
      authLoggedIn = false;
      renderAuth();
      throw new Error('Claude не подключён — нажмите «Войти» вверху чата.');
    }
    if (!res.ok) {
      let detail = '';
      try { detail = (await res.json()).error?.message || ''; } catch (_) {}
      throw new Error('HTTP ' + res.status + (detail ? ' — ' + detail : ''));
    }
    return res.json();
  }

  function showConfirmModal(title, content) {
    return new Promise(resolve => {
      confirmTitle.textContent = title;
      confirmBody.textContent = content;
      confirmOverlay.classList.add('show');
      const okBtn     = document.getElementById('confirm-ok');
      const cancelBtn = document.getElementById('confirm-cancel');
      function cleanup(result) {
        confirmOverlay.classList.remove('show');
        okBtn.removeEventListener('click', onOk);
        cancelBtn.removeEventListener('click', onCancel);
        resolve(result);
      }
      const onOk     = () => cleanup(true);
      const onCancel = () => cleanup(false);
      okBtn.addEventListener('click', onOk);
      cancelBtn.addEventListener('click', onCancel);
      confirmOverlay.addEventListener('click', e => {
        if (e.target === confirmOverlay) cleanup(false);
      }, { once: true });
    });
  }

  async function handleCreateCardTool(toolBlock) {
    const { title, content } = toolBlock.input;
    const confirmed = await showConfirmModal(title, content);
    let resultText;
    if (confirmed) {
      const cx = window.innerWidth / 2 - (chatPanelOpen ? 160 : 0);
      const cy = window.innerHeight / 2;
      const wp = screenToWorld(cx, cy);
      createNote(wp.x - 120, wp.y - 70, 240, 140, '', null, null, title, '', 'idea');
      const newest = [...notes.values()].at(-1);
      if (newest) newest.el.querySelector('.pane.idea').textContent = content;
      saveAll();
      resultText = `Карточка «${title}» успешно создана.`;
    } else {
      resultText = 'Пользователь отклонил создание карточки.';
    }
    chatMessages.push({
      role: 'user',
      content: [{ type: 'tool_result', tool_use_id: toolBlock.id, content: [{ type: 'text', text: resultText }] }]
    });
    saveChatMessages();
    const thinkingEl = appendChatMessage('thinking', '…');
    try {
      const followUp = await callClaudeChat(chatMessages);
      thinkingEl.remove();
      const texts = (followUp.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
      if (texts) {
        chatMessages.push({ role: 'assistant', content: followUp.content });
        appendChatMessage('assistant', texts);
        saveChatMessages();
      }
    } catch (err) {
      thinkingEl.remove();
      appendChatMessage('error', 'Ошибка: ' + (err?.message || String(err)));
    }
  }

  async function handleChatResponse(data) {
    chatMessages.push({ role: 'assistant', content: data.content });
    const textBlocks = (data.content || []).filter(b => b.type === 'text');
    const toolBlocks = (data.content || []).filter(b => b.type === 'tool_use');
    const fullText = textBlocks.map(b => b.text).join('\n').trim();
    if (fullText) appendChatMessage('assistant', fullText);
    saveChatMessages();
    for (const tb of toolBlocks) {
      if (tb.name === 'create_card') await handleCreateCardTool(tb);
    }
  }

  async function sendChatMessage() {
    const text = chatInput.value.trim();
    if (!text || chatSending) return;
    chatSending = true;
    btnSendChat.disabled = true;
    btnSendChat.classList.add('loading');
    chatInput.value = '';
    chatMessages.push({ role: 'user', content: text });
    appendChatMessage('user', text);
    saveChatMessages();
    const thinkingEl = appendChatMessage('thinking', '…');
    try {
      const data = await callClaudeChat(chatMessages);
      thinkingEl.remove();
      await handleChatResponse(data);
    } catch (err) {
      thinkingEl.remove();
      appendChatMessage('error', 'Ошибка: ' + (err?.message || String(err)));
    } finally {
      chatSending = false;
      btnSendChat.disabled = false;
      btnSendChat.classList.remove('loading');
    }
  }

  // Chat event wiring
  toggleChatBtn.addEventListener('click', toggleChatPanel);
  btnSendChat.addEventListener('click', sendChatMessage);
  chatInput.addEventListener('keydown', e => {
    // Enter — отправить, Shift+Enter — перенос строки
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
  });
  btnClearChat.addEventListener('click', clearChat);
  chatPanel.addEventListener('mousedown', e => e.stopPropagation());
  chatPanel.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });

  // ===== Desktop: чат-панель закреплена и тянется по горизонтали =====
  const chatResizer    = document.getElementById('chat-resizer');
  const CHAT_WIDTH_KEY = 'aiboard.chatWidth';
  const isDesktop      = window.matchMedia('(min-width: 601px)').matches;

  function applyChatWidth(w) {
    w = Math.max(280, Math.min(window.innerWidth * 0.7, w));
    document.documentElement.style.setProperty('--chat-width', w + 'px');
    updateAllWires();
  }
  const savedChatW = parseFloat(localStorage.getItem(CHAT_WIDTH_KEY));
  if (savedChatW) applyChatWidth(savedChatW);

  chatResizer.addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX;
    const startW = chatPanel.getBoundingClientRect().width;
    document.body.style.userSelect = 'none';
    const onMove = (ev) => applyChatWidth(startW + (startX - ev.clientX));
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      document.body.style.userSelect = '';
      localStorage.setItem(CHAT_WIDTH_KEY, String(Math.round(chatPanel.getBoundingClientRect().width)));
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  // На ПК панель открыта постоянно (кнопка-переключатель скрыта через CSS).
  if (isDesktop) {
    chatPanelOpen = true;
    chatPanel.classList.add('open');
    toggleChatBtn.classList.add('active');
  }

  // ===== Выбор модели Claude (шапка чата; тот же сторедж, что и в ⚙) =====
  const chatModelEl = document.getElementById('chat-model');
  function syncChatModel() {
    const m = getApiModel();
    if (![...chatModelEl.options].some(o => o.value === m)) {
      // Нестандартное имя модели из настроек — показываем как есть.
      const o = document.createElement('option');
      o.value = m; o.textContent = m;
      chatModelEl.appendChild(o);
    }
    chatModelEl.value = m;
  }
  chatModelEl.addEventListener('change', () => {
    localStorage.setItem(MODEL_STORAGE, chatModelEl.value);
    console.debug('[board] модель:', chatModelEl.value);
  });
  syncChatModel();

  // ===== Тема: светлая/тёмная =====
  const THEME_KEY = 'aiboard.theme';
  const themeBtn  = document.getElementById('toggleTheme');
  function refreshThemeBtn() {
    const dark = document.documentElement.classList.contains('dark');
    themeBtn.title = dark ? 'Включить свет (светлая тема)' : 'Погасить свет (тёмная тема)';
  }
  // После смены темы перерисовываем уже отрендеренные диаграммы в новой палитре.
  async function rerenderDiagrams() {
    if (!window.mermaid) return;
    initMermaid();
    for (const { el } of notes.values()) {
      const src  = el.dataset.mermaidSrc;
      const pane = el.querySelector('.pane.algorithm');
      if (src && pane && pane.querySelector('svg')) {
        try { await renderMermaidInto(pane, src); } catch (_) {}
      }
    }
  }
  themeBtn.addEventListener('click', () => {
    const dark = document.documentElement.classList.toggle('dark');
    localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
    refreshThemeBtn();
    rerenderDiagrams();
  });
  refreshThemeBtn();

  loadAll();
  loadChatMessages();
  applyTransform();
})();
</script>
</body>
</html>
